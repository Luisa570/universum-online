<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universum Online</title>

    <style>
        body {
    margin: 0;
    padding: 0;
    background-image: url('fondo.jpg'); /* Pon aquí el nombre de tu imagen */
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* Esto evita que el fondo se mueva si haces scroll */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e9ecef;
        }

        .main-container {
            display: flex;
            width: 900px;
            max-width: 95%;
            background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Lado Izquierdo (Azul) */
        .info-section {
            flex: 1;
            background-color: #1a3a8a;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .info-section h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .hero-img {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            filter: brightness(0.9);
        }

        /* Lado Derecho (Formulario) */
        .form-section {
            flex: 1;
            padding: 40px;
        }

        .form-section h2 {
            margin-bottom: 25px;
            color: #333;
            font-size: 1.4rem;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }

        input, select {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            background-color: #1a3a8a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #122a63;
        }

        #responseMsg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    
    <link rel="stylesheet" href="style.css" >
    </head>    
</body>
<div class="main-container">
        <!-- Sección Izquierda: Visual -->
        <div class="info-section">
            <div class="overlay">
                <spand>🎓</span>
                <h1>Universum Online</h1>
                <p>Formando profesionales en tecnología, diseño y desarrollo.</p>
                <img src="imagen 1.jpg" alt="Estudiantes" class="hero-img">
            </div>
        </div>

        <!-- Sección Derecha: Formulario -->
        <div class="form-section">
            <h2>Formulario de Registro</h2>
            <form id="registrationForm">
                <label>Nombres</label>
                <input type="text" name="nombres" required>

                <label>Apellidos</label>
                <input type="text" name="apellidos" required>

                <label>Teléfono</label>
                <input type="tel" name="telefono" required>

                <label>Correo</label>
                <input type="email" name="correo" required>

                <label>Carrera</label>
                <select name="carrera" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Diseño Gráfico Digital">Diseño Gráfico Digital</option>
                    <option value="Desarrollo Web">Desarrollo Web</option>
                    <option value="Animación 3D">Animación 3D</option>
                    <option value="Marketing Digital">Marketing Digital</option>
                </select>

                <button type="submit" id="submitBtn">Enviar Registro</button>
            </form>
            <p id="responseMsg"></p>
        </div>
    </div>
    <script>
        // AQUÍ PEGAS EL CÓDIGO QUE TENÍAS EN EL OTRO ARCHIVO
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxB4ZXZzoF6Ge07QptfQ-1EYLLaYrgQ7SGyny4rUkKeG9vqEJYoV-jOJ6A8bXLFJQ3lrw/exec'; // <--- PEGA TU URL AQUÍ
        const form = document.getElementById('registrationForm');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            msg.innerHTML = "Enviando...";

            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form)
            })
            .then(response => {
                msg.innerHTML = "¡Datos guardados con éxito!";
                form.reset();
                document.getElementById('submitBtn').disabled = false;
            })
            .catch(error => {
                msg.innerHTML = "Error al enviar: " + error.message;
                document.getElementById('submitBtn').disabled = false;
            });
        });
    </script>
</body>
</html>
</body>
</html>
